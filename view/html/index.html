<!DOCTYPE html>
<html lang="zh-CN">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>后台管理系统</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://unpkg.com/feather-icons"></script>
 <style>
  /* 自定义滚动条 */
  ::-webkit-scrollbar {
   width: 8px;
  }

  ::-webkit-scrollbar-track {
   background: #f1f5f9;
  }

  ::-webkit-scrollbar-thumb {
   background: #cbd5e1;
   border-radius: 4px;
  }
 </style>
</head>

<body class="bg-gray-100">
 <!-- 侧边栏 -->
 <aside class="bg-gray-800 text-white w-64 fixed h-full p-4 overflow-y-auto">
  <div class="mb-8">
   <h1 class="text-xl font-bold">后台管理系统</h1>
   <p class="text-gray-400 text-sm mt-1">v2.1.0</p>
  </div>
  <nav>
   <ul class="space-y-2">
    <li>
     <a href="index.html" class="flex items-center p-2 hover:bg-gray-700 rounded">
      <i data-feather="home" class="w-4 h-4 mr-2"></i> 首页概览
     </a>
    </li>
    <li>
     <a href="userList.html" class="flex items-center p-2 hover:bg-gray-700 rounded">
      <i data-feather="users" class="w-4 h-4 mr-2"></i> 用户管理
     </a>
    </li>
    <!-- 更多菜单项... -->
   </ul>
  </nav>
 </aside>

 <!-- 全局顶部导航 -->
 <header class="ml-64 fixed w-[calc(100%-16rem)] bg-white shadow-sm z-10">
  <div class="flex justify-between items-center px-8 py-4">
   <h2 class="text-xl font-bold" id="pageTitle"></h2>
   <div class="flex items-center gap-4">
    <button class="p-2 hover:bg-gray-100 rounded-full">
     <i data-feather="bell"></i>
    </button>
    <div class="flex items-center gap-2">
     <img
      src="https://ui-avatars.com/api/?name=User&background=random&size=128"
      class="w-8 h-8 rounded-full user-avatar-display" alt="用户头像">
     <span class="user-name-display text-sm font-medium">加载中...</span>
     <button onclick="logout()" class="text-red-600 hover:text-red-700 flex items-center gap-1">
      <i data-feather="log-out" class="w-5 h-5"></i>
      <span class="hidden sm:inline">退出系统</span>
     </button>
    </div>
   </div>
  </div>
 </header>

 <!-- 主内容容器 -->
 <main class="ml-64 pt-20 p-8" id="mainContent">
  <!-- 继承通用布局 -->
  <script>
   // 首页特定标题设置
   document.addEventListener('DOMContentLoaded', () => {
       if (typeof setPageTitle === 'function') {
           setPageTitle('数据概览');
       }
   });
  </script>

  <!-- 首页专属内容 -->
  <div class="space-y-6">
   <!-- 数据统计卡片 -->
   <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-xl shadow">
     <div class="flex justify-between items-center">
      <div>
       <p class="text-gray-500 text-sm">注册用户</p>
       <p class="text-3xl font-bold mt-2" id="totalUsers">0</p>
      </div>
      <div class="bg-blue-100 p-3 rounded-full">
       <i data-feather="users" class="w-6 h-6 text-blue-600"></i>
      </div>
     </div>
     <div class="mt-4 text-sm">
      <span class="text-green-500">↑ 15.2%</span> 上月增长
     </div>
    </div>
    <div class="bg-white p-6 rounded-xl shadow">
     <div class="flex justify-between items-center">
      <div>
       <p class="text-gray-500 text-sm">活跃用户</p>
       <p class="text-3xl font-bold mt-2">--</p>
      </div>
      <div class="bg-green-100 p-3 rounded-full">
       <i data-feather="activity" class="w-6 h-6 text-green-600"></i>
      </div>
     </div>
     <div class="mt-4 text-sm">
      <span class="text-green-500">↑ 8.4%</span> 今日活跃
     </div>
    </div>
    <div class="bg-white p-6 rounded-xl shadow">
     <div class="flex justify-between items-center">
      <div>
       <p class="text-gray-500 text-sm">待处理事项</p>
       <p class="text-3xl font-bold mt-2">5</p>
      </div>
      <div class="bg-yellow-100 p-3 rounded-full">
       <i data-feather="alert-circle" class="w-6 h-6 text-yellow-600"></i>
      </div>
     </div>
     <div class="mt-4 text-sm">
      <span class="text-red-500">需尽快处理</span>
     </div>
    </div>
   </div>

   <!-- 欢迎区域 -->
   <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-8 text-white">
    <h3 class="text-2xl font-bold mb-2">欢迎回来，<span class="user-name-display">管理员</span>！</h3>
    <p class="text-blue-100 opacity-90">今天是 2024年3月21日，系统运行一切正常。您有 3 条新的通知，请及时查看。</p>
    <button class="mt-6 bg-white text-blue-600 px-6 py-2 rounded-lg font-semibold hover:bg-blue-50 transition-colors">
     查看最新报告
    </button>
   </div>
  </div>
 </main>

 <script src="../js/main.js"></script>
</body>

</html>
